name: pawsure_app
description: "A pet care platform app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # 路由
  go_router: ^17.2.0

  # 网络
  dio: ^5.7.0

  # 本地存储
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.5.5

  # 国际化
  intl: ^0.20.0

  # Model 生成
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # 图片
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10

  # 加密
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.13.1
  freezed: ^3.0.0
  json_serializable: ^6.8.0

flutter:
  generate: true   # 开启 arb 自动生成
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/tabbar/
    - assets/images/login/
    - assets/icons/

